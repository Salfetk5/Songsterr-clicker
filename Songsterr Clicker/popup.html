<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 12px;
      background-color: #1a1a1a;
      color: #ffffff;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    h3 {
      margin: 0 0 12px 0;
      font-size: 15px;
      color: #ffca28;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
    }
    .switch-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #262626;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #333;
      margin-bottom: 12px;
    }
    .status-text { font-size: 13px; font-weight: 600; }
    .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ff4444; transition: .2s; border-radius: 22px;
    }
    .slider:before {
      position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
      background-color: white; transition: .2s; border-radius: 50%;
    }
    input:checked + .slider { background-color: #2ecc71; }
    input:checked + .slider:before { transform: translateX(18px); }
    
    .section-title {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      margin: 10px 0 6px 0;
      font-weight: bold;
    }
    .create-folder-container {
      display: table;
      width: 100%;
      margin-bottom: 12px;
    }
    .input-cell { display: table-cell; width: 80%; vertical-align: middle; }
    .btn-cell { display: table-cell; width: 20%; vertical-align: middle; padding-left: 6px; }
    .folder-input {
      width: 100%; background: #262626; color: #fff; border: 1px solid #333;
      padding: 8px; border-radius: 6px; font-size: 12px; box-sizing: border-box; outline: none;
    }
    .folder-input:focus { border-color: #ffca28; }
    .add-folder-submit {
      width: 100%; background: #333; color: #fff; border: 1px solid #444;
      padding: 7px 0; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 12px;
    }
    .add-folder-submit:hover { border-color: #ffca28; color: #ffca28; }
    
    .playlists-container {
      max-height: 200px;
      overflow-y: auto;
      background: #222;
      border-radius: 6px;
      padding: 6px;
      border: 1px solid #333;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .folder { margin-bottom: 8px; animation: slideIn 0.25s ease-out forwards; }
    .folder-header {
      background: #2d2d2d; padding: 6px; border-radius: 4px; font-size: 12px;
      font-weight: bold; color: #ffca28; display: flex; justify-content: space-between; align-items: center;
    }
    @keyframes pulseCount {
      0% { transform: scale(1); color: #ffca28; }
      50% { transform: scale(1.3); color: #2ecc71; }
      100% { transform: scale(1); color: #ffca28; }
    }
    .counter-animate { display: inline-block; animation: pulseCount 0.4s ease-out; }
    .folder-actions { display: flex; gap: 8px; align-items: center; }
    .add-to-folder-btn { color: #28a745; cursor: pointer; font-size: 14px; font-weight: bold; padding: 0 4px; transition: transform 0.2s ease; }
    .add-to-folder-btn:hover { color: #2ecc71; transform: rotate(90deg) scale(1.15); }
    .folder-items { padding-left: 6px; margin-top: 4px; }
    .track-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid #262626; }
    .track-link { color: #ccc; text-decoration: none; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 85%; }
    .track-link:hover { color: #ffca28; }
    .delete-btn { color: #ff4444; cursor: pointer; margin-left: 6px; font-size: 12px; }
    .delete-btn:hover { transform: scale(1.2); }
  </style>
</head>
<body>
  <h3>Optimizer Pro</h3>
  
  <div class="switch-container">
    <span class="status-text" id="status-label">Загрузка...</span>
    <label class="switch">
      <input type="checkbox" id="power-toggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="section-title">Создать папку</div>
  <div class="create-folder-container">
    <div class="input-cell">
      <input type="text" class="folder-input" id="folder-name-input" placeholder="Название папки...">
    </div>
    <div class="btn-cell">
      <button class="add-folder-submit" id="create-folder-btn">📁+</button>
    </div>
  </div>

  <div class="section-title">Мои Плейлисты</div>
  <div class="playlists-container" id="playlists-list"></div>

  <script src="popup.js"></script>
</body>
</html>
